[mcp_servers.mysql]
command = "npx"
args = [
  "-y",
  "@yukihito/mysql-mcp-server@1.0.2",
  "--host",
  "127.0.0.1",
  "--port",
  "3306",
  "--name",
  "root",
  "--password",
  "jhyz@2025",
  "--database",
  "wukong_test",
]

[mcp_servers.mysql.env]
NODE_NO_WARNINGS = "1"
