[project]
name = "wukong-service"

[context]
entry_files = [
  "AGENTS.md",
  "PROJECT_CONTEXT.md",
  "WUKONG_JAVA_STANDARDS.md",
]

[defaults]
primary_context_file = "PROJECT_CONTEXT.md"
java_standards_file = "WUKONG_JAVA_STANDARDS.md"
backend_changelog_file = "webapp/web/docs/changelog/project-prd-overview.md"
