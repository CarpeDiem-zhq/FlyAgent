server.servlet.context-path=/api
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.max-http-request-header-size=8192
# Spring Boot 10 分钟超时
server.tomcat.connection-timeout=600000
server.servlet.session.timeout=600s
#spring
spring.profiles.active=test
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# 数据库基本信息
spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Druid 连接池参数
spring.datasource.druid.initial-size=5
spring.datasource.druid.min-idle=5
spring.datasource.druid.max-active=50
spring.datasource.druid.max-wait=60000
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20

# Druid 监控配置
spring.datasource.druid.stat-view-servlet.enabled=true
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
spring.datasource.druid.stat-view-servlet.login-username=yeziy
spring.datasource.druid.stat-view-servlet.login-password=yz123456
spring.datasource.druid.stat-view-servlet.allow=127.0.0.1

#mybatis 全局设置
mybatis-plus.global-config.db-config.logic-delete-field=del
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.mapper-locations=classpath*:cn/yeezi/db/mapper/xml/*.xml

# springdoc-openapi项目配置
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-flat-param-object= true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=order
springdoc.api-docs.path=/v3/api-docs

springdoc.group-configs[0].group=default
springdoc.group-configs[0].paths-to-match=/**
springdoc.group-configs[0].packages-to-scan=cn.yeezi.controller

# knife4j的增强配置
knife4j.enable=true
knife4j.setting.language=zh_cn
knife4j.setting.enable-version=true
